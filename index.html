var bubble,anchor;
function addCss(){if(document.getElementById("yz-promo-css"))return;var s=document.createElement("style");s.id="yz-promo-css";s.textContent=CSS;document.head.appendChild(s)}
function inFooter(el){try{return !!(el.closest&&el.closest('footer,nav,[class*="footer"],[id*="footer"]'))}catch(e){return false}}
function findAnchor(){var as=document.querySelectorAll('a[href*="buymeacoffee.com/yazelin"]');if(!as.length)return null;

var pool=vis.length?vis:[].slice.call(as);
for(i=0;i<pool.length;i++)if(inFooter(pool[i]))return pool[i];
return pool[pool.length-1]}
function inject(){if(!INJECT||findAnchor()||document.querySelector(".yz-cluster"))return;

function blogLinked(){var as=document.querySelectorAll('a[href^="https://yazelin.github.io"]');for(var i=0;i<as.length;i++){try{if(new URL(as[i].href).pathname==="/")return true}catch(e){}}return false}
function addBlog(){if(!ADDBLOG||document.querySelector(".yz-blog")||blogLinked()||!inFooter(anchor))return;
var c=anchor.cloneNode(true);c.classList.remove("yz-hop");c.classList.add("yz-blog");
c.href="https://yazelin.github.io/";c.setAttribute("aria-label","亞澤的部落格");c.setAttribute("title","亞澤的部落格");

function hop(){anchor.classList.remove("yz-hop");void anchor.offsetWidth;anchor.classList.add("yz-hop")}
var shown=0,MAX_SHOWS=3;

bubble.style.left="0px";bubble.style.top="0px";
var bw=bubble.offsetWidth,bh=bubble.offsetHeight,cx=r.left+r.width/2;
var left=Math.max(8,Math.min(cx-bw/2,innerWidth-bw-8));

bubble.style.top=(above?r.top-bh-12:r.bottom+12)+"px";
bubble.classList.add(above?"yz-above":"yz-below");
bubble.style.setProperty("--yz-tail",Math.max(12,Math.min(cx-left,bw-12))+"px");
hop();
requestAnimationFrame(function(){bubble.classList.add("yz-on")});
setTimeout(function(){bubble.classList.remove("yz-on")},4200)}
function start(){addCss();inject();anchor=findAnchor();if(!anchor)return false;
try{if(getComputedStyle(anchor).display==="inline")anchor.style.display="inline-block"}catch(e){}
anchor.classList.add("yz-idle");
anchor.addEventListener("animationend",function(e){if(e.animationName==="yzHop")anchor.classList.remove("yz-hop")});
try{addBlog()}catch(e){}
bubble=document.createElement("div");bubble.className="yz-bubble";bubble.setAttribute("aria-hidden","true");document.body.appendChild(bubble);
window.__yzPromo=say;
(function loop(first){if(shown>=MAX_SHOWS)return;setTimeout(function(){say();loop(false)},first?18e3+Math.random()*12e3:9e4+Math.random()*9e4)})(true);
return true}
function boot(){var tries=0;(function t(){if(start())return;if(++tries<20)setTimeout(t,1500)})()}

})();
