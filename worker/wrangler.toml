name = "ipas-quiz-sync"
main = "src/index.js"
compatibility_date = "2026-06-01"

# 部署前先建 D1 並把 database_id 填進來:
#   npx wrangler d1 create ipas-quiz-sync
#   npx wrangler d1 execute ipas-quiz-sync --remote --file schema.sql
# 然後 npx wrangler deploy
[[d1_databases]]
binding = "DB"
database_name = "ipas-quiz-sync"
database_id = "a861f54c-1a47-4ede-9910-bd38bb8f5f4d"

# 舊 KV(2026-07 遷去 D1 前的資料)——只當唯讀 fallback,收斂後可整塊刪掉。
# fork 自架的人:直接刪這塊(worker 沒綁 SYNC 也能跑)。
[[kv_namespaces]]
binding = "SYNC"
id = "a38f175fd0bf48b0be7c8d997bc1cd04"

# 每小時整點跑,檢查誰到提醒時間且今天還沒練
[triggers]
crons = ["0 * * * *"]

[vars]
VAPID_PUBLIC = "BNn4Lwq818aHx8cb0LrcQ6IpRgHb9B3P_BOqusct-uFyJPQ4hlDrIOirliHoNdbbg5tg8zWfzBg5SZ0yBhRq7zA"
ADMIN_CONTACT = "mailto:yazelin@ching-tech.com"
